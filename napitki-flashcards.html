<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка бариста — карточки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #241b16;
    --bg-2: #2e2019;
    --paper: #f4ecdd;
    --paper-2: #ece1cc;
    --ink: #241b16;
    --copper: #c97c4e;
    --sage: #8fa377;
    --berry: #b5495b;
    --gold: #d4a843;
    --muted: #a89a89;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(201,124,78,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(143,163,119,0.08), transparent 45%),
      var(--bg);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 60px;
  }

  .rule{
    width:100%;
    max-width:640px;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 18px;
  }
  .rule .line{ flex:1; height:1px; background: rgba(244,236,221,0.18); }
  .rule .mark{ font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; }

  header{
    max-width:640px;
    width:100%;
    text-align:center;
    margin-bottom: 8px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(28px, 6vw, 40px);
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  h1 em{
    font-style: italic;
    font-weight: 500;
    color: var(--copper);
  }
  .subtitle{
    font-family:'IBM Plex Mono';
    font-size: 12.5px;
    color: var(--muted);
    letter-spacing:0.04em;
  }

  .chips{
    max-width: 680px;
    width:100%;
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding: 4px 2px 14px;
    margin-bottom: 6px;
    scrollbar-width: thin;
  }
  .chips::-webkit-scrollbar{ height:5px; }
  .chips::-webkit-scrollbar-thumb{ background: rgba(244,236,221,0.2); border-radius:3px; }
  .chip{
    flex:none;
    font-family:'IBM Plex Mono';
    font-size: 12px;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid rgba(244,236,221,0.22);
    background: rgba(244,236,221,0.04);
    color: var(--paper);
    cursor:pointer;
    white-space:nowrap;
    transition: all .15s ease;
  }
  .chip:hover{ border-color: rgba(244,236,221,0.45); }
  .chip.active{
    background: var(--copper);
    border-color: var(--copper);
    color: #241b16;
    font-weight:600;
  }

  .stage{
    width:100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top: 10px;
  }

  .progress-row{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .progress-bar{
    width:100%;
    height: 3px;
    background: rgba(244,236,221,0.12);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg, var(--copper), var(--gold));
    border-radius:2px;
    transition: width .25s ease;
  }

  .card-wrap{
    width:100%;
    aspect-ratio: 3 / 4;
    perspective: 1400px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    transition: transform .55s cubic-bezier(.2,.8,.2,1);
    transform-style: preserve-3d;
  }
  .card.flipped{ transform: rotateY(180deg); }

  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius: 10px;
    padding: 26px 24px 20px;
    display:flex;
    flex-direction:column;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35), 0 2px 0 rgba(0,0,0,0.2);
  }

  .face.front{
    background: var(--paper);
    color: var(--ink);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(36,27,22,0.05) 28px);
    justify-content:space-between;
    clip-path: polygon(
      0% 0%, 100% 0%, 100% 94%,
      96% 96%, 92% 94%, 88% 96%, 84% 94%, 80% 96%, 76% 94%, 72% 96%, 68% 94%, 64% 96%,
      60% 94%, 56% 96%, 52% 94%, 48% 96%, 44% 94%, 40% 96%, 36% 94%, 32% 96%, 28% 94%,
      24% 96%, 20% 94%, 16% 96%, 12% 94%, 8% 96%, 4% 94%, 0% 96%
    );
  }

  .face.back{
    background: var(--bg-2);
    color: var(--paper);
    transform: rotateY(180deg);
    justify-content:flex-start;
    border: 1px solid rgba(244,236,221,0.1);
  }

  .cat-stamp{
    align-self:flex-start;
    font-family:'IBM Plex Mono';
    font-size: 10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    border: 1.5px solid currentColor;
    border-radius: 999px;
    padding: 4px 10px;
    opacity:0.75;
    transform: rotate(-3deg);
  }

  .hole{
    position:absolute;
    top:16px; right:16px;
    width:16px; height:16px;
    border-radius:50%;
    background: var(--bg);
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.4);
  }

  .drink-name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(24px, 6vw, 32px);
    line-height:1.12;
    margin: 18px 0 0;
  }

  .front-footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    font-family:'IBM Plex Mono';
  }
  .flip-hint{
    font-size:11px;
    color: rgba(36,27,22,0.45);
    letter-spacing:0.06em;
  }
  .out-hint-front{
    font-size: 11px;
    color: rgba(36,27,22,0.55);
  }

  .back-label{
    font-family:'IBM Plex Mono';
    font-size: 10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .ingredients{
    font-family:'IBM Plex Mono';
    font-size: 14.5px;
    line-height:1.9;
    list-style:none;
    padding:0;
    margin:0;
    flex:1;
    overflow-y:auto;
  }
  .ingredients li{
    display:flex;
    justify-content:space-between;
    gap:10px;
    border-bottom: 1px dashed rgba(244,236,221,0.14);
    padding: 5px 0;
  }
  .ingredients li span:first-child{ color: var(--paper); }
  .ingredients li span:last-child{ color: var(--muted); white-space:nowrap; }

  .output-row{
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(244,236,221,0.18);
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
  }
  .output-row b{ color: var(--copper); font-size:13px; }

  .controls{
    display:flex;
    gap: 10px;
    margin-top: 22px;
    width:100%;
  }
  .btn{
    flex:1;
    font-family:'Inter';
    font-weight:600;
    font-size: 13.5px;
    padding: 12px 10px;
    border-radius: 8px;
    border: none;
    cursor:pointer;
    transition: transform .1s ease, filter .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-know{ background: var(--sage); color:#1c2216; }
  .btn-again{ background: var(--berry); color:#fbeaea; }
  .btn-know:hover, .btn-again:hover{ filter:brightness(1.08); }

  .nav-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 18px;
    margin-top: 16px;
  }
  .nav-btn{
    background: none;
    border: 1px solid rgba(244,236,221,0.25);
    color: var(--paper);
    width: 38px; height:38px;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transition: all .15s ease;
  }
  .nav-btn:hover{ border-color: var(--copper); color: var(--copper); }
  .shuffle-btn{
    font-family:'IBM Plex Mono';
    font-size: 11.5px;
    letter-spacing:0.06em;
    color: var(--muted);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .shuffle-btn:hover{ color: var(--paper); }

  .done-panel{
    max-width: 420px;
    width:100%;
    text-align:center;
    padding: 40px 20px;
  }
  .done-panel .drink-name{ font-size: 26px; }
  .done-stats{
    font-family:'IBM Plex Mono';
    font-size: 13px;
    color: var(--muted);
    margin: 16px 0 22px;
    line-height:1.8;
  }
  .done-stats b{ color: var(--sage); }
  .done-stats .again-count{ color: var(--berry); }

  footer{
    margin-top: 40px;
    font-family:'IBM Plex Mono';
    font-size: 10.5px;
    color: rgba(244,236,221,0.3);
    text-align:center;
    max-width:420px;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
  }
</style>
</head>

// flat list with category ref
let ALL = [];
DATA.forEach(cat => cat.items.forEach(item => ALL.push({...item, cat: cat.cat, icon: cat.icon})));

let filterCat = "Все";
let deck = [];
let idx = 0;
let flipped = false;
let known = 0, again = 0;
let seen = new Set();

function buildDeck(){
  deck = (filterCat === "Все" ? ALL : ALL.filter(c => c.cat === filterCat)).slice();
  idx = 0; flipped = false; known = 0; again = 0; seen = new Set();
  render();
}

function shuffleDeck(){
  for(let i = deck.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; flipped = false;
  render();
}

function renderChips(){
  const chips = document.getElementById('chips');
  const cats = ["Все", ...DATA.map(c => c.cat)];
  chips.innerHTML = cats.map(c => {
    const icon = c === "Все" ? "◆" : DATA.find(d => d.cat === c).icon;
    return `<button class="chip ${c === filterCat ? 'active' : ''}" data-cat="${c}">${icon} ${c}</button>`;
  }).join('');
  chips.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      filterCat = btn.dataset.cat;
      buildDeck();
      renderChips();
    });
  });
}

function render(){
  const stage = document.getElementById('stage');
  if(idx >= deck.length){
    stage.innerHTML = `
      <div class="done-panel">
        <div class="cat-stamp" style="color:var(--gold)">Раздел пройден</div>
        <div class="drink-name">Готово ✓</div>
        <div class="done-stats">
          Знаю уверенно: <b>${known}</b><br>
          Нужно повторить: <span class="again-count">${again}</span><br>
          Всего карточек: ${deck.length}
        </div>
        <button class="btn btn-know" style="width:100%" onclick="shuffleDeck()">Пройти ещё раз</button>
      </div>
    `;
    return;
  }
  const card = deck[idx];
  stage.innerHTML = `
    <div class="progress-row">
      <span>${card.icon} ${card.cat}</span>
      <span>${idx + 1} / ${deck.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(idx/deck.length)*100}%"></div></div>

    <div class="card-wrap" id="cardWrap">
      <div class="card ${flipped ? 'flipped' : ''}" id="cardEl">
        <div class="face front">
          <div class="hole"></div>
          <div class="cat-stamp" style="color:var(--copper)">${card.icon} ${card.cat}</div>
          <div class="drink-name">${card.n}</div>
          <div class="front-footer">
            <span class="flip-hint">нажми, чтобы открыть состав</span>
          </div>
        </div>
        <div class="face back">
          <div class="back-label">Состав</div>
          <ul class="ingredients">
            ${card.ing.map(([name, amt]) => `<li><span>${name}</span><span>${amt}</span></li>`).join('')}
          </ul>
          <div class="output-row"><span>Выход</span><b>${card.out}</b></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-again" onclick="mark(false)">Повторить</button>
      <button class="btn btn-know" onclick="mark(true)">Знаю</button>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="go(-1)">←</button>
      <button class="shuffle-btn" onclick="shuffleDeck()">перемешать</button>
      <button class="nav-btn" onclick="go(1)">→</button>
    </div>
  `;
  document.getElementById('cardWrap').addEventListener('click', toggleFlip);
}

function toggleFlip(){
  flipped = !flipped;
  document.getElementById('cardEl').classList.toggle('flipped', flipped);
}

function mark(isKnown){
  if(isKnown) known++; else again++;
  idx++; flipped = false;
  render();
}

function go(dir){
  idx = Math.max(0, Math.min(deck.length, idx + dir));
  flipped = false;
  render();
}

document.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){ e.preventDefault(); toggleFlip(); }
  if(e.code === 'ArrowRight'){ go(1); }
  if(e.code === 'ArrowLeft'){ go(-1); }
});

renderChips();
buildDeck();
</script>
